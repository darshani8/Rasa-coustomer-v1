<sc-if value="{{ isSearch }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding-bottom:28px">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goHome }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <div style="flex:1;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:10px 13px">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B0A9BC" stroke-width="2.2" style="flex-shrink:0"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4-4"></path></svg>
                <input value="{{ searchQuery }}" oninput="{{ setSearch }}" autofocus="" placeholder="Search vendors, dishes…" style="flex:1;border:none;outline:none;background:none;font:500 13.5px 'Inter';color:#3B2630;min-width:0">
                <sc-if value="{{ searchActive }}" hint-placeholder-val="{{ false }}">
                  <button onclick="{{ clearSearch }}" style="background:none;border:none;cursor:pointer;padding:0;display:flex;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B0A9BC" stroke-width="2.4"><circle cx="12" cy="12" r="10"></circle><path d="M15 9l-6 6M9 9l6 6"></path></svg></button>
                </sc-if>
              </div>
            </div>

            <div style="padding:18px 22px 0">
              <!-- empty state: suggestions -->
              <sc-if value="{{ searchIdle }}" hint-placeholder-val="{{ true }}">
                <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:13px">Popular searches</div>
                <div style="display:flex;flex-wrap:wrap;gap:9px">
                  <sc-for list="{{ searchSuggestions }}" as="sug">
                    <button onclick="{{ sug.onClick }}" style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ECE6DB;border-radius:999px;padding:9px 15px;cursor:pointer;font:600 12.5px 'Inter';color:#5A5368"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.2"><path d="M3 6h18M7 12h10M11 18h2"></path></svg>{{ sug.label }}</button>
                  </sc-for>
                </div>
              </sc-if>

              <!-- no results -->
              <sc-if value="{{ searchNoResults }}" hint-placeholder-val="{{ false }}">
                <div style="text-align:center;padding:50px 20px">
                  <div style="width:64px;height:64px;border-radius:50%;background:#F4EEE7;display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C3BCCB" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4-4"></path></svg></div>
                  <div style="font:700 15px var(--display,'Space Grotesk');color:#3B2630">No matches found</div>
                  <div style="font:500 12px 'Inter';color:#9A93A6;margin-top:6px">Try a dish or cuisine — like “biryani” or “dosa”.</div>
                </div>
              </sc-if>

              <!-- truck results -->
              <sc-if value="{{ hasTruckResults }}" hint-placeholder-val="{{ false }}">
                <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:12px">Food trucks · {{ searchTruckCount }}</div>
                <sc-for list="{{ searchTrucks }}" as="vd">
                  <button onclick="{{ vd.onClick }}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:10px;cursor:pointer;margin-bottom:11px">
                    <div style="width:60px;height:60px;border-radius:var(--radM,13px);flex-shrink:0;background:#EEE9E0 center/cover no-repeat;background-image:url({{ vd.photo }})"></div>
                    <div style="flex:1;min-width:0">
                      <div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ vd.name }}</div>
                      <div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ vd.cuisine }}</div>
                      <div style="display:flex;align-items:center;gap:5px;margin-top:7px"><span style="display:flex;align-items:center;gap:4px;background:var(--asoft,#EEF1DC);color:var(--adeep,#6E7A38);font:700 10px 'Inter';padding:3px 7px;border-radius:6px"><span style="width:5px;height:5px;border-radius:50%;background:var(--a,#9BAA5C);animation:rasaPulse 1.4s infinite"></span>{{ vd.waitLabel }}</span><span style="font:700 11px 'Inter';color:var(--p,#7D1535)">★ {{ vd.rating }}</span></div>
                    </div>
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C3BCCB" stroke-width="2.4" style="flex-shrink:0"><path d="m9 18 6-6-6-6"></path></svg>
                  </button>
                </sc-for>
              </sc-if>

              <!-- dish results -->
              <sc-if value="{{ hasDishResults }}" hint-placeholder-val="{{ false }}">
                <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin:18px 0 12px">Dishes · {{ searchDishCount }}</div>
                <sc-for list="{{ searchDishes }}" as="dish">
                  <button onclick="{{ dish.onClick }}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:10px;cursor:pointer;margin-bottom:11px">
                    <div style="width:54px;height:54px;border-radius:12px;flex-shrink:0;background:#EEE9E0 center/cover no-repeat;background-image:url({{ dish.img }})"></div>
                    <div style="flex:1;min-width:0">
                      <div style="display:flex;justify-content:space-between;gap:8px"><span style="font:700 13px var(--display,'Space Grotesk');color:#3B2630;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ dish.name }}</span><span style="font:700 12.5px var(--display,'Space Grotesk');color:var(--p,#7D1535);white-space:nowrap">{{ dish.priceLabel }}</span></div>
                      <div style="font:500 11px 'Inter';color:#9A93A6;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ dish.desc }}</div>
                      <div style="display:flex;align-items:center;gap:5px;margin-top:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#B0A9BC" stroke-width="2.2" style="flex-shrink:0"><path d="M14 18V6a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h2"></path><path d="M14 9h4l4 4v4a1 1 0 0 1-1 1h-1"></path><circle cx="7.5" cy="18.5" r="2.5"></circle><circle cx="17.5" cy="18.5" r="2.5"></circle></svg><span style="font:600 11px 'Inter';color:#B0A9BC">{{ dish.vendorName }}</span></div>
                    </div>
                  </button>
                </sc-for>
              </sc-if>
            </div>
          </div>
          </sc-if>

          <!-- ===================== SUPPORT HUB ===================== -->
