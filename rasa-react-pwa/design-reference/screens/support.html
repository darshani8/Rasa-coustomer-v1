<sc-if value="{{ isSupport }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding-bottom:28px" data-screen-label="Help &amp; Support">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goProfile }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 18px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.4px">Help &amp; Support</span>
            </div>

            <div style="padding:18px 22px 0">
              <!-- hero -->
              <div style="position:relative;background:linear-gradient(135deg,var(--p,#7D1535),var(--p2,#9E2A48));border-radius:var(--radXL,22px);padding:20px;overflow:hidden">
                <div style="position:absolute;right:-26px;top:-26px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)"></div>
                <div style="position:relative">
                  <div style="font:700 19px var(--display,'Space Grotesk');color:#fff;letter-spacing:-.3px">Hi Ananya, how can we help?</div>
                  <div style="font:500 12px 'Inter';color:rgba(255,255,255,.82);margin-top:6px;line-height:1.5">Search our help centre or reach the team directly — we usually reply in a few minutes.</div>
                  <div style="display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:11px 13px;margin-top:14px">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4-4"></path></svg>
                    <span style="font:500 12.5px 'Inter';color:rgba(255,255,255,.9)">Describe your issue…</span>
                  </div>
                </div>
              </div>

              <!-- quick contact -->
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px">
                <button onclick="{{ goChat }}" style="display:flex;flex-direction:column;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:15px 8px;cursor:pointer">
                  <div style="width:40px;height:40px;border-radius:12px;background:var(--psoft,#F7E9EC);display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-3.8-.8L3 21l1.9-5.2A8.4 8.4 0 0 1 12 3a8.4 8.4 0 0 1 9 8.5Z"></path></svg></div>
                  <span style="font:700 11.5px var(--display,'Space Grotesk');color:#3B2630">Live Chat</span>
                </button>
                <button style="display:flex;flex-direction:column;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:15px 8px;cursor:pointer">
                  <div style="width:40px;height:40px;border-radius:12px;background:var(--asoft,#EEF1DC);display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--adeep,#6E7A38)" stroke-width="2.1"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"></path></svg></div>
                  <span style="font:700 11.5px var(--display,'Space Grotesk');color:#3B2630">Call Us</span>
                </button>
                <button style="display:flex;flex-direction:column;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:15px 8px;cursor:pointer">
                  <div style="width:40px;height:40px;border-radius:12px;background:#F4EEE7;display:flex;align-items:center;justify-content:center"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><rect x="2" y="4" width="20" height="16" rx="3"></rect><path d="m2 7 10 6 10-6"></path></svg></div>
                  <span style="font:700 11.5px var(--display,'Space Grotesk');color:#3B2630">Email</span>
                </button>
              </div>

              <!-- topics -->
              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin:22px 0 12px">Browse topics</div>
              <sc-for list="{{ supportTopicList }}" as="tp">
                <button onclick="{{ tp.onClick }}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:14px;cursor:pointer;margin-bottom:11px">
                  <div style="width:42px;height:42px;border-radius:12px;background:var(--psoft,#F7E9EC);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><path d="{{ tp.icon }}"></path></svg></div>
                  <div style="flex:1;min-width:0"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">{{ tp.title }}</div><div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:3px">{{ tp.desc }}</div></div>
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C3BCCB" stroke-width="2.4" style="flex-shrink:0"><path d="m9 18 6-6-6-6"></path></svg>
                </button>
              </sc-for>

              <!-- raise ticket -->
              <button onclick="{{ goTicket }}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#241F33;border:none;border-radius:var(--radL,16px);padding:15px;cursor:pointer;margin-top:5px">
                <div style="width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg></div>
                <div style="flex:1"><div style="font:700 14px var(--display,'Space Grotesk');color:#fff">Raise a ticket</div><div style="font:500 11.5px 'Inter';color:rgba(255,255,255,.7);margin-top:3px">Still stuck? We’ll get back within 24h</div></div>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.4" style="flex-shrink:0"><path d="m9 18 6-6-6-6"></path></svg>
              </button>
            </div>
          </div>
          </sc-if>

          <!-- ===================== SUPPORT TOPIC (FAQ) ===================== -->
