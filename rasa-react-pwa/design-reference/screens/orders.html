<sc-if value="{{ isOrders }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding-bottom:28px">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 18px 4px">
              <button onclick="{{ goProfile }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Order History</span>
              <button style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4-4"></path></svg></button>
            </div>

            <!-- filter row -->
            <div style="display:flex;align-items:center;gap:9px;padding:12px 18px 14px;position:relative;z-index:30">
              <button onclick="{{ onTabAll }}" style="{{ tabAll }}">All Orders</button>
              <button onclick="{{ onTabCancelled }}" style="{{ tabCancelled }}">Cancelled</button>
              <div style="margin-left:auto;position:relative">
                <button onclick="{{ toggleSort }}" style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ECE6DB;border-radius:999px;padding:8px 13px;cursor:pointer;font:600 12px 'Inter';color:#3B2630">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.2"><path d="M3 6h18M7 12h10M11 18h2"></path></svg>{{ sortLabel }}
                </button>
                <sc-if value="{{ sortOpen }}" hint-placeholder-val="{{ false }}">
                  <div style="position:absolute;right:0;top:42px;width:180px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);box-shadow:0 12px 30px -10px rgba(60,40,20,.35);overflow:hidden;z-index:40">
                    <div style="font:600 9px 'JetBrains Mono',monospace;color:#A39BB0;text-transform:uppercase;letter-spacing:.6px;padding:10px 13px 4px">Sort by</div>
                    <sc-for list="{{ sortItems }}" as="si">
                      <button onclick="{{ si.onClick }}" style="{{ si.rowStyle }}">{{ si.label }}</button>
                    </sc-for>
                  </div>
                </sc-if>
              </div>
            </div>

            <div style="padding:0 18px">
              <sc-for list="{{ orders }}" as="o">
                <div style="display:flex;gap:13px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,18px);padding:12px;margin-bottom:12px">
                  <div style="width:84px;height:84px;border-radius:var(--radM,14px);flex-shrink:0;background:#EEE9E0 center/cover no-repeat;background-image:url({{ o.img }})"></div>
                  <div style="flex:1;min-width:0">
                    <div style="display:flex;align-items:center;gap:5px">
                      <span style="font:700 14px var(--display,'Space Grotesk');color:#3B2630;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ o.name }}</span>
                      <sc-if value="{{ o.verified }}" hint-placeholder-val="{{ false }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="var(--p,#7D1535)" style="flex-shrink:0"><path d="m9 12 2 2 4-4 1.5 1.2L12 17l-4.5-4.5z" fill="#fff"></path><path d="M12 2 9.5 4.5 6 4l-.5 3.5L2 9l1.8 3L2 15l3.5 1.5L6 20l3.5-.5L12 22l2.5-2.5L18 20l.5-3.5L22 15l-1.8-3L22 9l-3.5-1.5L18 4l-3.5.5z"></path><path d="m8.5 12 2.2 2.2L15.5 9.5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></path></svg></sc-if>
                    </div>
                    <div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:3px;line-height:1.35">{{ o.area }}</div>
                    <div style="display:flex;align-items:center;gap:5px;margin-top:7px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.2"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg><span style="font:600 11px 'Inter';color:var(--p,#7D1535)">{{ o.visitsLabel }}</span></div>
                    <div style="font:500 10.5px 'Inter';color:#B0A9BC;margin-top:4px">{{ o.date }}</div>
                    <sc-if value="{{ o.isCancelled }}" hint-placeholder-val="{{ false }}"><span style="display:inline-block;margin-top:6px;font:700 9px 'JetBrains Mono',monospace;letter-spacing:.5px;text-transform:uppercase;color:#C0392B;background:#FBE7EC;padding:3px 7px;border-radius:6px">Cancelled</span></sc-if>
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0">
                    <div style="font:700 15px var(--display,'Space Grotesk');color:#3B2630">{{ o.amountLabel }}</div>
                    <div style="font:500 10.5px 'Inter';color:#9A93A6">{{ o.visitsCount }}</div>
                    <button onclick="{{ o.onReorder }}" style="background:var(--psoft,#F7E9EC);color:var(--p,#7D1535);border:1px solid var(--pborder,#EAC9D1);border-radius:9px;padding:6px 13px;cursor:pointer;font:700 11px 'Inter'">Reorder</button>
                  </div>
                </div>
              </sc-for>
            </div>
          </div>
          </sc-if>

          <!-- ===================== ORDER DETAILS (offers) ===================== -->
