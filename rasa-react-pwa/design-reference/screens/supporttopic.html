<sc-if value="{{ isSupportTopic }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding-bottom:28px" data-screen-label="Support topic">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goSupport }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">{{ activeTopicTitle }}</span>
            </div>

            <div style="padding:18px 22px 0">
              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:12px">Frequently asked</div>
              <sc-for list="{{ topicFaqs }}" as="f">
                <div style="background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);overflow:hidden;margin-bottom:11px">
                  <button onclick="{{ f.onClick }}" style="width:100%;display:flex;align-items:center;gap:12px;text-align:left;background:none;border:none;padding:15px;cursor:pointer">
                    <span style="flex:1;font:700 13px var(--display,'Space Grotesk');color:#3B2630;line-height:1.4">{{ f.q }}</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.4" style="flex-shrink:0;transform:{{ f.chevron }}"><path d="m6 9 6 6 6-6"></path></svg>
                  </button>
                  <sc-if value="{{ f.open }}" hint-placeholder-val="{{ false }}">
                    <div style="padding:0 15px 15px;font:500 12.5px 'Inter';color:#6F6A7D;line-height:1.6">{{ f.a }}</div>
                  </sc-if>
                </div>
              </sc-for>

              <!-- still need help -->
              <div style="background:#F4EEE7;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:15px;margin-top:6px;text-align:center">
                <div style="font:700 13px var(--display,'Space Grotesk');color:#3B2630">Still need help?</div>
                <div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:4px">Our team is one tap away.</div>
                <div style="display:flex;gap:10px;margin-top:13px">
                  <button onclick="{{ goChat }}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--p,#7D1535);color:#fff;border:none;border-radius:12px;padding:12px;cursor:pointer;font:700 12px var(--display,'Space Grotesk')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-3.8-.8L3 21l1.9-5.2A8.4 8.4 0 0 1 12 3a8.4 8.4 0 0 1 9 8.5Z"></path></svg>Live chat</button>
                  <button onclick="{{ goTicket }}" style="flex:1;background:var(--pchip,#F1DEE3);color:var(--p,#7D1535);border:none;border-radius:12px;padding:12px;cursor:pointer;font:700 12px var(--display,'Space Grotesk')">Raise ticket</button>
                </div>
              </div>
            </div>
          </div>
          </sc-if>

          <!-- ===================== LIVE CHAT ===================== -->
