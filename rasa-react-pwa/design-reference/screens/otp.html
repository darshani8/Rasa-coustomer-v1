<sc-if value="{{ isOtp }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Verify OTP">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #F1EBE3">
              <button onclick="{{ goSignup }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.2"><path d="M15 18l-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Verify number</span>
            </div>

            <div style="padding:26px 26px 0;flex:1">
              <div style="font:700 22px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.4px">Enter the code</div>
              <div style="font:500 12.5px 'Inter';color:#9A93A6;margin-top:6px;line-height:1.5;margin-bottom:30px">We sent a 4-digit verification code to your phone. Enter it below to finish creating your account.</div>

              <div style="display:flex;gap:13px;justify-content:center;margin-bottom:26px">
                <input id="otp-box-0" value="{{ otp0 }}" oninput="{{ onOtp0 }}" onkeydown="{{ onOtpKey0 }}" inputmode="numeric" maxlength="1" autocomplete="off" style="{{ otpBoxStyle0 }}">
                <input id="otp-box-1" value="{{ otp1 }}" oninput="{{ onOtp1 }}" onkeydown="{{ onOtpKey1 }}" inputmode="numeric" maxlength="1" autocomplete="off" style="{{ otpBoxStyle1 }}">
                <input id="otp-box-2" value="{{ otp2 }}" oninput="{{ onOtp2 }}" onkeydown="{{ onOtpKey2 }}" inputmode="numeric" maxlength="1" autocomplete="off" style="{{ otpBoxStyle2 }}">
                <input id="otp-box-3" value="{{ otp3 }}" oninput="{{ onOtp3 }}" onkeydown="{{ onOtpKey3 }}" inputmode="numeric" maxlength="1" autocomplete="off" style="{{ otpBoxStyle3 }}">
              </div>

              <div style="text-align:center;font:500 12px 'Inter';color:#9A93A6">Didn't get a code? <span style="color:var(--p,#7D1535);font-weight:700;cursor:pointer">Resend</span></div>
            </div>

            <div style="position:sticky;bottom:0;left:0;right:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:13px 18px;z-index:45">
              <button onclick="{{ confirmOtp }}" disabled="{{ otpIncomplete }}" style="{{ confirmOtpStyle }}">Confirm OTP</button>
            </div>
          </div>
          </sc-if>

          <!-- ===================== LOCATION PICKER ===================== -->
