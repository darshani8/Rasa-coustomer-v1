<sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Create account">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goLogin }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Create account</span>
            </div>

            <div style="padding:18px 26px 0;flex:1">
              <div style="font:700 22px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.4px">Join Rasa</div>
              <div style="font:500 12.5px 'Inter';color:#9A93A6;margin-top:6px;line-height:1.5;margin-bottom:22px">Create an account to order ahead, save addresses and earn reward points.</div>

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Full name</div>
              <input placeholder="Your name" style="width:100%;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;font:500 13px 'Inter';color:#3B2630;outline:none;box-sizing:border-box;margin-bottom:14px">

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Phone number</div>
              <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;margin-bottom:14px">
                <span style="font:700 13px var(--display,'Space Grotesk');color:#3B2630;border-right:1px solid #ECE6DB;padding-right:10px">+91</span>
                <input placeholder="98765 43210" style="flex:1;border:none;outline:none;background:none;font:500 13px 'Inter';color:#3B2630;min-width:0">
              </div>

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Email</div>
              <input placeholder="you@example.com" style="width:100%;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;font:500 13px 'Inter';color:#3B2630;outline:none;box-sizing:border-box;margin-bottom:14px">

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Create password</div>
              <input type="password" placeholder="At least 8 characters" style="width:100%;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;font:500 13px 'Inter';color:#3B2630;outline:none;box-sizing:border-box;margin-bottom:14px">

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Confirm password</div>
              <input type="password" placeholder="Re-enter your password" style="width:100%;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;font:500 13px 'Inter';color:#3B2630;outline:none;box-sizing:border-box;margin-bottom:16px">

              <div style="display:flex;align-items:flex-start;gap:9px;margin-bottom:6px"><div style="width:18px;height:18px;border-radius:6px;background:var(--p,#7D1535);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2"><path d="m5 12 5 5 9-10"></path></svg></div><span style="font:500 11.5px 'Inter';color:#9A93A6;line-height:1.5">I agree to Rasa’s <span style="color:var(--p,#7D1535);font-weight:600">Terms</span> and <span style="color:var(--p,#7D1535);font-weight:600">Privacy Policy</span>.</span></div>
            </div>

            <div style="position:sticky;bottom:0;left:0;right:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:13px 18px;z-index:45">
              <button onclick="{{ goOtp }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:16px;font:700 13.5px var(--display,'Space Grotesk');letter-spacing:.3px;cursor:pointer">Create account</button>
              <div style="text-align:center;margin-top:11px;font:500 12px 'Inter';color:#9A93A6">Already have an account? <span onclick="{{ goLogin }}" style="color:var(--p,#7D1535);font-weight:700;cursor:pointer">Sign in</span></div>
            </div>
          </div>
          </sc-if>
