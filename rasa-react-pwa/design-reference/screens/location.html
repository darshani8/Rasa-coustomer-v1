<sc-if value="{{ isLocation }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding-bottom:28px" data-screen-label="Choose location">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goHome }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Choose location</span>
            </div>

            <div style="padding:16px 22px 0">
              <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:12px 14px">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B0A9BC" stroke-width="2.2"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4-4"></path></svg>
                <span style="font:500 13px 'Inter';color:#A39BB0">Search for area, street name…</span>
              </div>

              <button onclick="{{ useSavedLocation }}" style="display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--psoft,#F7E9EC);border:1px solid var(--pborder,#EAC9D1);border-radius:var(--radM,14px);padding:13px 14px;cursor:pointer;margin-top:14px">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path><circle cx="12" cy="12" r="4"></circle></svg>
                <div style="flex:1"><div style="font:700 13px var(--display,'Space Grotesk');color:var(--p,#7D1535)">Use current location</div><div style="font:500 11px 'Inter';color:#B07A88;margin-top:2px">Detect via GPS</div></div>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C99AA6" stroke-width="2.4"><path d="m9 18 6-6-6-6"></path></svg>
              </button>

              <div style="display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,14px);padding:13px 14px;margin-top:11px">
                <div style="width:36px;height:36px;border-radius:10px;background:#F4EEE7;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><path d="M3 21h18M5 21V10M19 21V10M3 10l9-6 9 6M9 21v-6h6v6"></path></svg></div>
                <div style="flex:1;min-width:0"><div style="font:700 12.5px var(--display,'Space Grotesk');color:#3B2630">Saved address</div><div style="font:500 11px 'Inter';color:#9A93A6;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ savedAddrLine }}</div></div>
              </div>

              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin:22px 0 4px">Popular areas</div>
              <sc-for list="{{ locationOptions }}" as="loc">
                <button onclick="{{ loc.onClick }}" style="{{ loc.rowStyle }}">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1" style="flex-shrink:0"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="2.6"></circle></svg>
                  <span style="flex:1;font:600 13px 'Inter';color:#3B2630">{{ loc.label }}</span>
                  <sc-if value="{{ loc.active }}" hint-placeholder-val="{{ false }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.6"><path d="m5 12 5 5 9-10"></path></svg></sc-if>
                </button>
              </sc-for>
            </div>
          </div>
          </sc-if>

          <!-- ===================== VENDOR ===================== -->
