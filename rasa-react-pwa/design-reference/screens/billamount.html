<sc-if value="{{ isBillAmount }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Enter bill amount">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goVendor }}" aria-label="Back" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="flex:1;font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">{{ billVendor }}</span>
              <div style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg></div>
            </div>
            <div style="margin:12px 18px 0;display:flex;align-items:center;gap:9px;background:#F4EEE7;border:1px solid #ECE6DB;border-radius:12px;padding:10px 13px">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8A76A" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg>
              <span style="font:500 11.5px 'Inter';color:#6F6A7D">Please ensure you're paying at the correct outlet</span>
            </div>
            <div style="text-align:center;padding:34px 22px 22px">
              <div style="font:500 12px 'Inter';color:#9A93A6;margin-bottom:12px">Enter amount</div>
              <div style="font:700 46px var(--display,'Space Grotesk');color:#2A1B22;letter-spacing:-1.5px">₹ {{ billAmtBig }}</div>
            </div>
            <div style="margin:0 18px;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #ECE6DB;border-radius:16px;padding:12px 14px">
              <div style="width:38px;height:38px;border-radius:11px;background:var(--psoft,#F7E9EC);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7"></path></svg></div>
              <div style="flex:1;min-width:0"><div style="font:700 12.5px var(--display,'Space Grotesk');color:#3B2630">Flat ₹250 OFF</div><div style="font:500 11px 'Inter';color:#9A93A6;margin-top:2px">Use code WELCOME250</div></div>
              <span style="font:700 16px 'Inter';color:#C3BCCB;letter-spacing:1px">···</span>
            </div>
            <button onclick="{{ openRasaInfo }}" style="margin:11px 18px 0;display:flex;align-items:center;gap:11px;background:#FBF6EA;border:1px solid #F0E4C9;border-radius:16px;padding:13px 14px;cursor:pointer;text-align:left">
              <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#F2C14E,#E8A317);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7A4E12" stroke-width="2.2"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v8M9.5 10.5h3.5a1.5 1.5 0 0 1 0 3H9.5"></path></svg></div>
              <span style="flex:1;font:600 12px 'Inter';color:#6E5A2E">Get 20% cashback as RasaCoins after payment</span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C9B274" stroke-width="2.4" style="flex-shrink:0"><path d="m9 18 6-6-6-6"></path></svg>
            </button>
            <div style="margin-top:auto;padding:20px 14px 6px">
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
                <sc-for list="{{ billKeyList }}" as="key" hint-placeholder-count="12">
                  <button onclick="{{ key.onClick }}" style="background:#fff;border:1px solid #ECE6DB;border-radius:14px;padding:15px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;font:600 21px var(--display,'Space Grotesk');color:#2A1B22">
                    <sc-if value="{{ key.isBack }}" hint-placeholder-val="{{ false }}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6F6A7D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM18 9l-6 6M12 9l6 6"></path></svg></sc-if>
                    <sc-if value="{{ key.isDigit }}" hint-placeholder-val="{{ true }}">{{ key.label }}</sc-if>
                  </button>
                </sc-for>
              </div>
            </div>
            <div style="padding:8px 18px 18px">
              <sc-if value="{{ billCanPay }}" hint-placeholder-val="{{ false }}">
                <button onclick="{{ billProceed }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:15px;padding:16px;font:700 13.5px var(--display,'Space Grotesk');letter-spacing:.3px;cursor:pointer;box-shadow:0 8px 22px -10px rgba(125,21,53,.6)">Proceed to apply offers</button>
              </sc-if>
              <sc-if value="{{ billProceedDisabled }}" hint-placeholder-val="{{ true }}">
                <button style="width:100%;background:#D8C3CB;color:#fff;border:none;border-radius:15px;padding:16px;font:700 13.5px var(--display,'Space Grotesk');letter-spacing:.3px;cursor:not-allowed;opacity:.9">Proceed to apply offers</button>
              </sc-if>
            </div>
          </div>
          </sc-if>

          <!-- ===================== 3 · OFFERS & CASHBACK ===================== -->
