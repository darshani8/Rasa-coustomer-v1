<sc-if value="{{ isLogin }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Sign in">
            <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 26px">
              <div style="display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:34px">
                <div style="width:62px;height:62px;border-radius:var(--radL,18px);background:var(--p,#7D1535);color:#fff;display:flex;align-items:center;justify-content:center;font:700 30px var(--display,'Space Grotesk')">R</div>
                <div style="font:700 26px var(--display,'Space Grotesk');color:#3B2630;margin-top:18px;letter-spacing:-.5px">Welcome back</div>
                <div style="font:500 12.5px 'Inter';color:#9A93A6;margin-top:7px;line-height:1.5;max-width:250px">Sign in to skip the queue and order ahead from your favourite trucks.</div>
              </div>

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Phone number</div>
              <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;margin-bottom:14px">
                <span style="font:700 13px var(--display,'Space Grotesk');color:#3B2630;border-right:1px solid #ECE6DB;padding-right:10px">+91</span>
                <input placeholder="98765 43210" style="flex:1;border:none;outline:none;background:none;font:500 13px 'Inter';color:#3B2630;min-width:0">
              </div>

              <div style="font:600 11px 'Inter';color:#6F6A7D;margin-bottom:6px">Password</div>
              <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:13px 14px;margin-bottom:8px">
                <input type="password" value="rasa1234" style="flex:1;border:none;outline:none;background:none;font:500 13px 'Inter';color:#3B2630;min-width:0">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B0A9BC" stroke-width="2.1"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </div>
              <div style="text-align:right;margin-bottom:22px"><span style="font:600 11.5px 'Inter';color:var(--p,#7D1535);cursor:pointer">Forgot password?</span></div>

              <button onclick="{{ goHome }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:16px;font:700 13.5px var(--display,'Space Grotesk');letter-spacing:.3px;cursor:pointer">Sign in</button>

              <div style="display:flex;align-items:center;gap:12px;margin:22px 0"><div style="flex:1;height:1px;background:#E7DFD2"></div><span style="font:600 10px 'JetBrains Mono',monospace;color:#B0A9BC;letter-spacing:.5px">OR</span><div style="flex:1;height:1px;background:#E7DFD2"></div></div>

              <div style="display:flex;flex-direction:column;gap:11px">
                <button onclick="{{ goHome }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#3B2630;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:14px;font:700 12.5px var(--display,'Space Grotesk');cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z"></path><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"></path><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84Z"></path><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38Z"></path></svg> Continue with Google</button>
                <button onclick="{{ goHome }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:#fff;color:#3B2630;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:14px;font:700 12.5px var(--display,'Space Grotesk');cursor:pointer"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><rect x="2" y="4" width="20" height="16" rx="3"></rect><path d="m2 7 10 6 10-6"></path></svg> Continue with email</button>
              </div>

              <div style="text-align:center;margin-top:24px;font:500 12px 'Inter';color:#9A93A6">New to Rasa? <span onclick="{{ goSignup }}" style="color:var(--p,#7D1535);font-weight:700;cursor:pointer">Create account</span></div>
            </div>
          </div>
          </sc-if>

          <!-- ===================== SIGN UP ===================== -->
