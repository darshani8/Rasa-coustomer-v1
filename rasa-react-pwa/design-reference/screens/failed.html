<sc-if value="{{ isFailed }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding:0 0 32px">
            <div style="display:flex;align-items:center;gap:12px;padding:14px 18px 4px">
              <button onclick="{{ goPay }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 18px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Payment failed</span>
            </div>

            <div style="padding:0 22px">
              <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:18px">
                <div style="width:150px;height:150px;border-radius:50%;background:#FCEBEE;display:flex;align-items:center;justify-content:center"><div style="width:104px;height:104px;border-radius:50%;background:#F7D2D9;display:flex;align-items:center;justify-content:center"><div style="width:68px;height:68px;border-radius:50%;background:#A01829;display:flex;align-items:center;justify-content:center"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M12 7v6"></path><path d="M12 17h.01"></path></svg></div></div></div>
                <div style="font:700 24px var(--display,'Space Grotesk');color:#3B2630;margin-top:22px;letter-spacing:-.3px">Payment Failed</div>
                <div style="font:500 13px 'Inter';color:#9A93A6;margin-top:9px;line-height:1.6;max-width:280px">We couldn't process your payment of <b style="color:#3B2630">{{ moneyTotal }}</b>. Please check your bank details or try another method.</div>
              </div>

              <div style="background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,18px);padding:17px;margin-top:28px">
                <span style="font:600 10px 'JetBrains Mono',monospace;color:#A39BB0;text-transform:uppercase;letter-spacing:.6px">Details</span>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;font:500 13px 'Inter';color:#6F6A7D"><span>Reason</span><span style="font-weight:700;color:#C0392B">Transaction declined by bank</span></div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;font:500 13px 'Inter';color:#6F6A7D"><span>Transaction ID</span><span style="font:600 12.5px 'JetBrains Mono',monospace;color:#3B2630">TXN_9876543210</span></div>
              </div>

              <button onclick="{{ goPay }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:16px;font:700 13px var(--display,'Space Grotesk');letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:26px;display:flex;align-items:center;justify-content:center;gap:9px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"></path></svg> Retry Payment</button>
              <button onclick="{{ goPay }}" style="width:100%;background:var(--pchip,#F1DEE3);color:var(--p,#7D1535);border:none;border-radius:var(--radL,16px);padding:16px;font:700 12.5px var(--display,'Space Grotesk');letter-spacing:.8px;text-transform:uppercase;cursor:pointer;margin-top:12px">Change Payment Method</button>
              <div style="display:flex;align-items:center;justify-content:center;gap:7px;margin-top:24px;cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg><span style="font:600 12.5px 'Inter';color:var(--p,#7D1535)">Contact Support</span></div>
            </div>
          </div>
          </sc-if>

          <!-- ===================== QUEUE ===================== -->
