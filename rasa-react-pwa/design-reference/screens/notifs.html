<sc-if value="{{ isNotifs }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;padding-bottom:28px" data-screen-label="Notifications">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goProfile }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Notifications</span>
            </div>

            <div style="padding:18px 22px 0">
              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:12px">Preferences</div>
              <div style="background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,18px);overflow:hidden">
                <sc-for list="{{ notifRows }}" as="n">
                  <div style="display:flex;align-items:center;gap:13px;padding:15px;border-bottom:1px solid #F1EBE3">
                    <div style="flex:1"><div style="font:700 13px var(--display,'Space Grotesk');color:#3B2630">{{ n.title }}</div><div style="font:500 11px 'Inter';color:#9A93A6;margin-top:3px">{{ n.desc }}</div></div>
                    <button onclick="{{ n.onToggle }}" style="{{ n.trackStyle }}" aria-label="{{ n.title }}"><span style="{{ n.knobStyle }}"></span></button>
                  </div>
                </sc-for>
              </div>
              <div style="font:500 11px 'Inter';color:#B0A9BC;line-height:1.5;margin-top:14px;padding:0 4px">You can change these anytime. Critical security and payment alerts are always sent.</div>
            </div>
          </div>
          </sc-if>

          <!-- ===================== LANGUAGE ===================== -->
