

<div style="min-height:100vh;display:flex;align-items:flex-start;justify-content:center;gap:44px;padding:48px 40px 64px">

  <!-- LEFT: review rail -->
  <aside style="width:248px;flex-shrink:0;position:sticky;top:48px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="width:34px;height:34px;border-radius:10px;background:var(--p,#7D1535);color:#fff;display:flex;align-items:center;justify-content:center;font:700 18px var(--display,'Space Grotesk')">R</div>
      <div style="font:700 22px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.5px">rasa</div>
    </div>
    <div style="font:500 12.5px 'Inter';color:#857E91;margin-bottom:24px;padding-left:2px">Skip the queue. Order ahead.</div>
    <sc-for list="{{ navGroups }}" as="grp" hint-placeholder-count="3">
      <div style="margin-bottom:18px">
        <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:#A39BB0;padding:0 8px 8px">{{ grp.label }}</div>
        <sc-for list="{{ grp.items }}" as="it" hint-placeholder-count="3">
          <button onclick="{{ it.onClick }}" style="{{ it.rowStyle }}">
            <span style="font:600 10px 'JetBrains Mono',monospace;opacity:.55;width:16px;text-align:right">{{ it.num }}</span>
            <span>{{ it.label }}</span>
          </button>
        </sc-for>
      </div>
    </sc-for>
  </aside>

  <!-- CENTER: device -->
  <main style="display:flex;flex-direction:column;align-items:center">
    <div style="display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #E4DDD0;border-radius:999px;padding:6px 14px 6px 8px;margin-bottom:18px;box-shadow:0 1px 2px rgba(60,40,20,.04)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--p,#7D1535)"></span>
      <span style="font:600 12px 'Inter';color:#5A5368">{{ screenName }}</span>
    </div>

    <!-- phone -->
    <div style="width:392px;height:844px;background:#161320;border-radius:56px;padding:11px;box-shadow:0 40px 80px -30px rgba(40,25,60,.55),0 0 0 1px rgba(0,0,0,.04)">
      <div style="width:100%;height:100%;background:#FAF6F3;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column">

        <!-- status bar -->
        <div style="height:46px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:relative;z-index:60;background:transparent">
          <span style="font:600 14px 'Inter';color:#1F1A2E">9:41</span>
          <div style="position:absolute;left:50%;top:9px;transform:translateX(-50%);width:104px;height:26px;background:#161320;border-radius:999px"></div>
          <div style="display:flex;align-items:center;gap:6px;color:#1F1A2E">
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"></rect><rect x="4.5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"></rect><rect x="9" y="2" width="3" height="10" rx="1" fill="currentColor"></rect><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".35"></rect></svg>
            <svg width="22" height="12" viewBox="0 0 22 12" fill="none"><rect x="0.5" y="0.5" width="18" height="11" rx="3" stroke="currentColor" opacity=".4"></rect><rect x="2" y="2" width="14" height="8" rx="1.5" fill="currentColor"></rect><rect x="19.5" y="4" width="1.5" height="4" rx="1" fill="currentColor" opacity=".5"></rect></svg>
          </div>
        </div>

        <!-- scroll viewport -->
        <div class="scr" style="flex:1;overflow-y:auto;overflow-x:hidden;position:relative">
