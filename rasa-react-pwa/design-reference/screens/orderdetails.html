<sc-if value="{{ isOffers }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goQueue }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 16px var(--display,'Space Grotesk');color:#3B2630">Order Details</span>
              <button style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.2"><circle cx="12" cy="12" r="10"></circle><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01"></path></svg></button>
            </div>

            <div style="padding:16px 18px 0;flex:1">
              <!-- coupon input -->
              <div style="display:flex;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,14px);padding:7px 7px 7px 14px;align-items:center">
                <input value="{{ couponInput }}" oninput="{{ onCouponInput }}" placeholder="Enter coupon code" style="flex:1;border:none;outline:none;background:none;font:500 13px 'Inter';color:#3B2630;min-width:0">
                <button onclick="{{ onApplyCoupon }}" style="background:var(--p,#7D1535);color:#fff;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font:700 12.5px 'Inter'">Apply</button>
              </div>

              <!-- filter chips -->
              <div class="scr" ref="{{ dragScroll }}" style="display:flex;gap:9px;overflow-x:auto;margin:14px -18px 0;padding:0 18px 2px;cursor:grab">
                <sc-for list="{{ offerChips }}" as="chip">
                  <button onclick="{{ chip.onClick }}" style="{{ chip.style }}">{{ chip.label }}</button>
                </sc-for>
              </div>

              <!-- bank offers -->
              <sc-if value="{{ showBankSection }}" hint-placeholder-val="{{ true }}">
                <div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630;margin:22px 0 12px">Bank Offers</div>
                <sc-for list="{{ bankOffers }}" as="bo">
                  <div style="background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,18px);padding:15px;margin-bottom:12px">
                    <div style="display:flex;gap:12px">
                      <div style="width:40px;height:40px;border-radius:11px;background:var(--psoft,#F7E9EC);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.2"><path d="M3 21h18M5 21V10M19 21V10M3 10l9-6 9 6M9 21v-6h6v6"></path></svg></div>
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:8px"><span style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">{{ bo.code }}</span><sc-if value="{{ bo.hasTag }}" hint-placeholder-val="{{ false }}"><span style="font:700 8px 'JetBrains Mono',monospace;letter-spacing:.5px;color:var(--adeep,#6E7A38);background:var(--asoft,#EEF1DC);padding:3px 7px;border-radius:6px">{{ bo.tag }}</span></sc-if></div>
                        <div style="font:700 12.5px 'Inter';color:#3B2630;margin-top:6px">{{ bo.title }}</div>
                        <div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:4px;line-height:1.45">{{ bo.desc }}</div>
                      </div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid #EFE9DF;margin-top:13px;padding-top:13px">
                      <span style="font:600 12px 'Inter';color:var(--p,#7D1535);cursor:pointer">View Details</span>
                      <button onclick="{{ bo.onSelect }}" style="{{ bo.selectStyle }}">{{ bo.selectLabel }}</button>
                    </div>
                  </div>
                </sc-for>
              </sc-if>

              <!-- available coupons -->
              <sc-if value="{{ showCouponSection }}" hint-placeholder-val="{{ true }}">
                <div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630;margin:22px 0 12px">Available Coupons</div>
                <sc-for list="{{ coupons }}" as="cp">
                  <button onclick="{{ cp.onSelect }}" style="display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:14px;margin-bottom:11px;cursor:pointer">
                    <div style="width:42px;height:42px;border-radius:50%;background:var(--psoft,#F7E9EC);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.2"><path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0l-7.2-7.2A2 2 0 0 1 2.8 12V4.8A2 2 0 0 1 4.8 2.8H12a2 2 0 0 1 1.4.6l7.2 7.2a2 2 0 0 1 0 2.8Z"></path><circle cx="7.5" cy="7.5" r="1.5" fill="var(--p,#7D1535)"></circle></svg></div>
                    <div style="flex:1;min-width:0">
                      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font:600 12px 'Inter';color:#6F6A7D">{{ cp.label }}</span><span style="font:700 12.5px var(--display,'Space Grotesk');color:var(--p,#7D1535)">{{ cp.code }}</span></div>
                      <div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:4px;line-height:1.45">{{ cp.desc }}</div>
                    </div>
                    <div style="{{ cp.radioStyle }}"><span style="color:#fff;font-size:12px;font-weight:700">{{ cp.tick }}</span></div>
                  </button>
                </sc-for>
              </sc-if>
            </div>

            <div style="position:sticky;bottom:0;left:0;right:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:13px 18px;z-index:45">
              <button onclick="{{ goBooking }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:15px;font:700 14px var(--display,'Space Grotesk');letter-spacing:.3px;cursor:pointer">Next</button>
            </div>
          </div>
          </sc-if>

        </div>

        <!-- ===================== QUEUE BOTTOM SHEET (vendor) ===================== -->
