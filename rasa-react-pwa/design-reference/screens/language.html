<sc-if value="{{ isLanguage }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Language">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goProfile }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Language</span>
            </div>

            <div style="padding:18px 22px 0;flex:1">
              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:12px">Choose your language</div>
              <div style="background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,18px);overflow:hidden">
                <sc-for list="{{ langRows }}" as="lg">
                  <button onclick="{{ lg.onClick }}" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid #F1EBE3;padding:15px;cursor:pointer">
                    <span style="flex:1;font:600 13.5px 'Inter';color:#3B2630">{{ lg.label }}</span>
                    <div style="{{ lg.radioStyle }}"><span style="color:#fff;font-size:12px;font-weight:700">{{ lg.tick }}</span></div>
                  </button>
                </sc-for>
              </div>
            </div>

            <div style="position:sticky;bottom:0;left:0;right:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:13px 18px;z-index:45">
              <button onclick="{{ saveLanguage }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:16px;font:700 13px var(--display,'Space Grotesk');letter-spacing:.5px;cursor:pointer">Save</button>
            </div>
          </div>
          </sc-if>
