<sc-if value="{{ isChat }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Live chat">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goSupport }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <div style="position:relative;flex-shrink:0"><div style="width:38px;height:38px;border-radius:50%;background:var(--p,#7D1535);display:flex;align-items:center;justify-content:center;font:700 14px var(--display,'Space Grotesk');color:#fff">R</div><span style="position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:#3FB37F;border:2px solid #FAF6F3"></span></div>
              <div style="flex:1"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">Riya · Rasa Support</div><div style="font:500 10.5px 'Inter';color:#3FB37F">Online · replies in ~2 min</div></div>
            </div>

            <div style="flex:1;padding:18px;background:#F4EEE7">
              <div style="text-align:center;font:600 9.5px 'JetBrains Mono',monospace;color:#B0A9BC;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px">Today</div>
              <sc-for list="{{ chatMsgs }}" as="m">
                <div style="{{ m.rowStyle }}"><div style="{{ m.bubbleStyle }}">{{ m.text }}</div></div>
              </sc-for>
            </div>

            <div style="position:sticky;bottom:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:11px 16px 13px;z-index:45">
              <div class="scr" ref="{{ dragScroll }}" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;cursor:grab">
                <sc-for list="{{ chatQuickReplies }}" as="qr">
                  <button onclick="{{ qr.onClick }}" style="flex-shrink:0;background:#fff;border:1px solid #ECE6DB;border-radius:999px;padding:7px 13px;cursor:pointer;font:600 11.5px 'Inter';color:var(--p,#7D1535)">{{ qr.label }}</button>
                </sc-for>
              </div>
              <div style="display:flex;align-items:center;gap:9px">
                <div style="flex:1;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radM,13px);padding:11px 14px">
                  <input value="{{ chatInput }}" oninput="{{ onChatInput }}" onkeydown="{{ onChatKey }}" placeholder="Type a message…" style="flex:1;border:none;outline:none;background:none;font:500 13px 'Inter';color:#3B2630;min-width:0">
                </div>
                <button onclick="{{ sendChat }}" style="width:44px;height:44px;border-radius:var(--radM,13px);background:var(--p,#7D1535);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg></button>
              </div>
            </div>
          </div>
          </sc-if>

          <!-- ===================== RAISE A TICKET ===================== -->
