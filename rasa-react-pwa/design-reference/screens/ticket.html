<sc-if value="{{ isTicket }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%" data-screen-label="Raise a ticket">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <button onclick="{{ goSupport }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
              <span style="font:700 17px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.3px">Raise a ticket</span>
            </div>

            <div style="padding:18px 22px 0;flex:1">
              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:11px">Category</div>
              <div class="scr" ref="{{ dragScroll }}" style="display:flex;gap:9px;overflow-x:auto;margin:0 -22px 18px;padding:0 22px 4px;cursor:grab">
                <sc-for list="{{ ticketCats }}" as="tc">
                  <button onclick="{{ tc.onClick }}" style="{{ tc.style }}">{{ tc.label }}</button>
                </sc-for>
              </div>

              <div style="font:600 10.5px 'JetBrains Mono',monospace;letter-spacing:1px;color:#A39BB0;text-transform:uppercase;margin-bottom:11px">Describe the issue</div>
              <textarea value="{{ ticketText }}" oninput="{{ onTicketText }}" placeholder="Tell us what happened — include your order or transaction ID if you have it." style="width:100%;height:130px;resize:none;background:#fff;border:1px solid #ECE6DB;border-radius:var(--radL,16px);padding:14px;font:500 13px/1.6 'Inter';color:#3B2630;outline:none;box-sizing:border-box"></textarea>

              <button style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:none;border:1.5px dashed #D6C2C7;border-radius:var(--radM,14px);padding:14px;cursor:pointer;margin-top:13px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.2"><path d="M21.4 11.05 12 20.5a5.5 5.5 0 0 1-7.8-7.8l9.2-9.2a3.7 3.7 0 0 1 5.2 5.2l-9.2 9.2a1.8 1.8 0 0 1-2.6-2.6l8.5-8.5"></path></svg><span style="font:700 12.5px var(--display,'Space Grotesk');color:var(--p,#7D1535)">Attach a screenshot</span></button>

              <div style="display:flex;align-items:flex-start;gap:9px;background:var(--asoft,#EEF1DC);border:1px solid var(--aborder,#DCE3C0);border-radius:var(--radM,13px);padding:12px 14px;margin-top:16px">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--adeep,#6E7A38)" stroke-width="2.2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg>
                <span style="font:500 11.5px 'Inter';color:var(--adeep,#6E7A38);line-height:1.5">Most tickets are resolved within 24 hours. You’ll get updates by notification and email.</span>
              </div>
            </div>

            <div style="position:sticky;bottom:0;left:0;right:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:13px 18px;z-index:45">
              <sc-if value="{{ ticketCanSubmit }}" hint-placeholder-val="{{ false }}">
                <button onclick="{{ submitTicket }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:16px;font:700 13px var(--display,'Space Grotesk');letter-spacing:.5px;cursor:pointer">Submit ticket</button>
              </sc-if>
              <sc-if value="{{ ticketBlocked }}" hint-placeholder-val="{{ true }}">
                <button style="width:100%;background:#E7D6DB;color:#B79AA2;border:none;border-radius:var(--radL,16px);padding:16px;font:700 13px var(--display,'Space Grotesk');letter-spacing:.5px;cursor:not-allowed">Submit ticket</button>
              </sc-if>
            </div>
          </div>
          </sc-if>
