<sc-if value="{{ isPay }}" hint-placeholder-val="{{ false }}">
          <div style="animation:rasaFade .35s ease;display:flex;flex-direction:column;min-height:100%">
            <div style="position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:rgba(250,246,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid #EFE9DF">
              <div style="display:flex;align-items:center;gap:12px">
                <button onclick="{{ goBooking }}" style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.4"><path d="m15 18-6-6 6-6"></path></svg></button>
                <span style="font:700 18px var(--display,'Space Grotesk');color:#3B2630;letter-spacing:-.4px">Payment Methods</span>
              </div>
              <button style="width:36px;height:36px;border-radius:12px;background:#fff;border:1px solid #ECE6DB;display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B2630" stroke-width="2.2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"></path></svg></button>
            </div>

            <div style="padding:16px 18px 0;flex:1">
              <!-- total balance -->
              <div style="display:flex;align-items:center;gap:14px;background:var(--psoft,#F7E9EC);border:1px solid var(--pborder,#EAC9D1);border-radius:var(--radL,18px);padding:16px;margin-bottom:24px">
                <div style="width:46px;height:46px;border-radius:var(--radM,13px);background:var(--p,#7D1535);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="3"></rect><path d="M2 10h20"></path></svg></div>
                <div style="flex:1"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">Total Balance</div><div style="font:500 11px 'Inter';color:#9A8A8E;margin-top:2px">Available for checkout</div></div>
                <div style="font:700 20px var(--display,'Space Grotesk');color:var(--p,#7D1535)">{{ balanceLabel }}</div>
              </div>

              <!-- recommended -->
              <div style="font:700 11px 'JetBrains Mono',monospace;letter-spacing:.8px;text-transform:uppercase;color:#A39BB0;margin-bottom:11px">Recommended</div>
              <button onclick="{{ payVisa.onClick }}" style="width:100%;display:flex;align-items:center;gap:13px;background:#fff;border-radius:var(--radL,16px);padding:15px;cursor:pointer;margin-bottom:24px;{{ payVisa.border }}">
                <div style="width:46px;height:46px;border-radius:12px;background:var(--p,#7D1535);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="3"></rect><path d="M2 10h20"></path></svg></div>
                <div style="flex:1;text-align:left"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">Saved Visa Card</div><div style="font:500 12px 'JetBrains Mono',monospace;color:#9A93A6;margin-top:3px">**** 4242</div></div>
                <div style="{{ payVisa.radioStyle }}"><span style="color:#fff;font-size:13px;font-weight:700">{{ payVisa.tick }}</span></div>
              </button>

              <!-- cards -->
              <div style="font:700 11px 'JetBrains Mono',monospace;letter-spacing:.8px;text-transform:uppercase;color:#A39BB0;margin-bottom:11px">Cards</div>
              <button onclick="{{ payMc.onClick }}" style="width:100%;display:flex;align-items:center;gap:13px;background:#fff;border-radius:var(--radL,16px);padding:15px;cursor:pointer;margin-bottom:11px;{{ payMc.border }}">
                <div style="width:46px;height:46px;border-radius:12px;background:#F4EEE7;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="12" r="6" fill="#C8662A" opacity=".85"></circle><circle cx="15" cy="12" r="6" fill="var(--p,#7D1535)" opacity=".8"></circle></svg></div>
                <div style="flex:1;text-align:left"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">Mastercard</div><div style="font:500 12px 'JetBrains Mono',monospace;color:#9A93A6;margin-top:3px">**** 8821</div></div>
                <div style="{{ payMc.radioStyle }}"><span style="color:#fff;font-size:13px;font-weight:700">{{ payMc.tick }}</span></div>
              </button>
              <button style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:1.5px dashed #D6C2C7;border-radius:var(--radL,16px);padding:15px;cursor:pointer;margin-bottom:24px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.4"><path d="M12 5v14M5 12h14"></path></svg><span style="font:700 13px var(--display,'Space Grotesk');color:var(--p,#7D1535)">Add New Card</span></button>

              <!-- digital wallets -->
              <div style="font:700 11px 'JetBrains Mono',monospace;letter-spacing:.8px;text-transform:uppercase;color:#A39BB0;margin-bottom:11px">Digital Wallets</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:24px">
                <button onclick="{{ payApple.onClick }}" style="display:flex;flex-direction:column;align-items:flex-start;gap:16px;background:#fff;border-radius:var(--radL,16px);padding:15px;cursor:pointer;{{ payApple.border }}">
                  <div style="{{ payApple.radioStyle }}"><span style="color:#fff;font-size:13px;font-weight:700">{{ payApple.tick }}</span></div>
                  <div style="text-align:left"><div style="font:700 13.5px var(--display,'Space Grotesk');color:#3B2630">Apple Pay</div><div style="font:500 11px 'Inter';color:#9A93A6;margin-top:3px">Default</div></div>
                </button>
                <button onclick="{{ payPhonePe.onClick }}" style="display:flex;flex-direction:column;align-items:flex-start;gap:16px;background:#fff;border-radius:var(--radL,16px);padding:15px;cursor:pointer;{{ payPhonePe.border }}">
                  <div style="{{ payPhonePe.radioStyle }}"><span style="color:#fff;font-size:13px;font-weight:700">{{ payPhonePe.tick }}</span></div>
                  <div style="text-align:left"><div style="font:700 13.5px var(--display,'Space Grotesk');color:#3B2630">PhonePe</div><div style="font:500 11px 'Inter';color:#9A93A6;margin-top:3px">Connect Wallet</div></div>
                </button>
              </div>

              <!-- other methods -->
              <div style="font:700 11px 'JetBrains Mono',monospace;letter-spacing:.8px;text-transform:uppercase;color:#A39BB0;margin-bottom:11px">Other Methods</div>
              <button onclick="{{ payNet.onClick }}" style="width:100%;display:flex;align-items:center;gap:13px;background:#fff;border-radius:var(--radL,16px);padding:15px;cursor:pointer;margin-bottom:11px;{{ payNet.border }}">
                <div style="width:46px;height:46px;border-radius:12px;background:#F4EEE7;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><path d="M3 21h18M5 21V10M19 21V10M3 10l9-6 9 6M9 21v-6h6v6"></path></svg></div>
                <div style="flex:1;text-align:left"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">Net Banking</div><div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:3px">Select from 50+ banks</div></div>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C3BCCB" stroke-width="2.4"><path d="m9 18 6-6-6-6"></path></svg>
              </button>
              <button onclick="{{ payCash.onClick }}" style="width:100%;display:flex;align-items:center;gap:13px;background:#fff;border-radius:var(--radL,16px);padding:15px;cursor:pointer;{{ payCash.border }}">
                <div style="width:46px;height:46px;border-radius:12px;background:#F4EEE7;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="var(--p,#7D1535)" stroke-width="2.1"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2.5"></circle></svg></div>
                <div style="flex:1;text-align:left"><div style="font:700 14px var(--display,'Space Grotesk');color:#3B2630">Cash</div><div style="font:500 11.5px 'Inter';color:#9A93A6;margin-top:3px">Pay at delivery</div></div>
                <div style="{{ payCash.radioStyle }}"><span style="color:#fff;font-size:13px;font-weight:700">{{ payCash.tick }}</span></div>
              </button>
            </div>

            <div style="position:sticky;bottom:0;left:0;right:0;background:rgba(250,246,243,.96);backdrop-filter:blur(10px);border-top:1px solid #EFE9DF;padding:13px 18px;z-index:45">
              <button onclick="{{ goSuccess }}" style="width:100%;background:var(--p,#7D1535);color:#fff;border:none;border-radius:var(--radL,16px);padding:16px;font:700 14px var(--display,'Space Grotesk');letter-spacing:.3px;cursor:pointer">Pay {{ moneyTotal }}</button>
              <div style="text-align:center;margin-top:10px"><span onclick="{{ goFailed }}" style="font:600 11.5px 'Inter';color:#B0A9BC;cursor:pointer;text-decoration:underline;text-underline-offset:2px">Simulate a declined payment</span></div>
            </div>
          </div>
          </sc-if>

          <!-- ===================== SUCCESS ===================== -->
